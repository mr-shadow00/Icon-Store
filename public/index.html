<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Icon Store</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7.5" height="7.5" rx="2"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="2" opacity=".55"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="2" opacity=".55"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="2" opacity=".3"/></svg>
    </span>
    <div class="brand-text">
      <h1>Icon Store</h1>
      <p>drop an icon &middot; get a link</p>
    </div>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search" type="text" placeholder="search name or tag&hellip;" autocomplete="off" />
    <div class="search-right">
      <span class="search-count" id="searchCount"></span>
      <button id="searchClear" class="search-clear" type="button" aria-label="Clear search" tabindex="-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div class="topbar-right">
    <button id="openUpload" class="btn btn-accent">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Upload icon
    </button>
  </div>
</header>

<main id="grid" class="grid"></main>

<div id="emptyState" class="empty-state hidden">
  <div class="empty-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="1.75"/><path d="M21 15l-5.5-5.5a1.5 1.5 0 0 0-2.1 0L5 18"/></svg>
  </div>
  <h2>Nothing in the store yet</h2>
  <p>Upload an icon to generate its first direct link.</p>
  <button class="btn btn-accent" id="emptyUploadBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Upload icon
  </button>
</div>

<!-- Upload modal -->
<div id="modalOverlay" class="overlay hidden">
  <div class="modal">
    <div class="modal-head">
      <h2>Upload icon</h2>
      <button id="closeModal" class="icon-btn" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="modal-body">
      <label id="dropzone" class="dropzone" for="fileInput">
        <div id="dropzoneEmpty" class="dz-empty">
          <div class="dz-glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="M6.5 9.5L12 4l5.5 5.5"/><path d="M4 16v2.5A2.5 2.5 0 0 0 6.5 21h11a2.5 2.5 0 0 0 2.5-2.5V16"/></svg>
          </div>
          <p><strong>Click to choose</strong> or drag a file here</p>
          <p class="dz-sub">PNG, SVG, WEBP, JPG, ICO, GIF &middot; up to 8MB</p>
        </div>
        <img id="dropzonePreview" class="dz-preview hidden" alt="preview" />
      </label>
      <input id="fileInput" type="file" accept=".png,.svg,.webp,.jpg,.jpeg,.ico,.gif,image/*" class="visually-hidden" />

      <div class="field">
        <label for="nameInput">Name</label>
        <input id="nameInput" type="text" placeholder="e.g. proxmox" />
      </div>

      <div class="field">
        <label for="tagsInput">Tags <span class="field-hint">comma separated, optional</span></label>
        <input id="tagsInput" type="text" placeholder="e.g. virtualization, hypervisor" />
      </div>

      <div class="field hidden" id="keyField">
        <label for="keyInput">Admin key</label>
        <input id="keyInput" type="password" placeholder="required to upload" />
      </div>

      <p id="uploadError" class="error-text hidden"></p>
    </div>

    <div class="modal-foot">
      <button id="submitUpload" class="btn btn-accent" disabled>Upload</button>
    </div>
  </div>
</div>

<!-- Mobile FAB -->
<button id="openUploadMobile" class="fab" aria-label="Upload icon">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  <span>Upload icon</span>
</button>

<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
<script>
  // Wire mobile FAB to the same upload modal
  var fab = document.getElementById("openUploadMobile");
  var desktopBtn = document.getElementById("openUpload");
  if (fab && desktopBtn) {
    fab.addEventListener("click", function() { desktopBtn.click(); });
  }
</script>
</body>
</html>
